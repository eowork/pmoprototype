services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pmo_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      # PG18+ images store data in a version subdir and expect the mount at
      # /var/lib/postgresql (NOT /data) — see docker-library/postgres#1259.
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./pmo-backend
    restart: unless-stopped
    # Loads JWT/OAuth/LDAP secrets etc. from the existing local pmo-backend/.env.
    # The DATABASE_* values below override that file so the backend talks to the
    # "postgres" service instead of localhost.
    env_file:
      - ./pmo-backend/.env
    environment:
      # Force production in the container — overrides NODE_ENV=development from the
      # dev .env (env_file). Dev mode would select TsMorphMetadataProvider, which
      # reads ./src/*.entity.ts (absent from the compiled image) and crashes startup.
      NODE_ENV: production
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-pmo_dashboard}
      DATABASE_USER: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  frontend:
    build:
      context: ./pmo-frontend
    restart: unless-stopped
    env_file:
      - ./pmo-frontend/.env
    environment:
      # Browser-facing API URL — must be reachable from the user's browser
      # (the app is an SPA, so requests are made client-side, not container-to-container).
      NUXT_PUBLIC_API_BASE: http://localhost:${BACKEND_PORT:-3000}
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3001}:3000"

  # T5a — Self-hosted LDAP test directory (proves auth before MIS cutover)
  # NOT started by default. Start explicitly with:
  #   docker compose --profile ldap-test up -d
  # Then add LDAP_* vars to pmo-backend/.env and run:
  #   docker compose up -d backend   (recreates backend with LDAP env active)
  # See ldap-test/MIS_SWAP.md for the full procedure and MIS swap guide.
  openldap:
    profiles: ["ldap-test"]
    image: bitnami/openldap:2
    environment:
      LDAP_ROOT: dc=carsu,dc=edu,dc=ph
      LDAP_ADMIN_USERNAME: admin
      LDAP_ADMIN_PASSWORD: testldapadmin
      LDAP_CUSTOM_LDIF_DIR: /ldifs
      ALLOW_EMPTY_PASSWORD: "no"
    volumes:
      - ./ldap-test/seed.ldif:/ldifs/seed.ldif:ro
    ports:
      - "1389:1389"

volumes:
  pgdata:
  backend_uploads:
